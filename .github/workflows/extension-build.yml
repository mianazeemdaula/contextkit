# Builds the browser extension and uploads a zipped dist/ as an artifact,
# suitable for manual upload to the Chrome Web Store / Mozilla Add-ons.
# References:
#   - https://github.com/actions/upload-artifact
#   - https://github.com/pnpm/action-setup

name: Extension Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - '.github/workflows/extension-build.yml'
  workflow_dispatch:

jobs:
  build-extension:
    name: Build & Zip Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @contextkit/extension build

      - name: Zip dist/
        working-directory: packages/extension
        run: |
          if [ ! -d dist ]; then
            echo "::error::packages/extension/dist not found after build"
            exit 1
          fi
          cd dist
          zip -r "../contextkit-extension-${{ github.sha }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextkit-extension-${{ github.sha }}.zip
          path: packages/extension/contextkit-extension-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 30
